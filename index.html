<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pollo Loco</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/8_coin/coin_1.png">
    <link rel="stylesheet" href="./styles/font.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/index.css">

    <script type="module" src="./scripts/game.js" defer></script>

</head>

<body>
    <main>
        <section>
            <h1 class="hide-on-mobile">EL POLLO LOCO</h1>
            <div id="fullscreen">
                <canvas id="canvas" width="720" height="480"></canvas>

                <div id="overlay-main-menu">
                    <!-- start-menu -->
                    <div class="start-button-container orientation-display-hide">
                        <button class="button-rect" id="startBtn"> Start Hunt! </button>
                        <button class="button-rect  hide-object" id="closefullscreenBtn">Exit</button>
                        <p class="start-story-text">Help Pepe fight the Boss Rooster to rid the world of the chicken plague.</p>
                    </div>
                    <p class="orientation-display-show orientation-text">Pepe need more space! Turn your Device to play.
                    </p>
                </div>

                <div id="overlay-UI" class="hide-object">
                    <!-- button-bar-top -->
                    <div>
                        <input class="audio_slider" type="range" id='volumeSlider' min=0 max=1 step=0.01 value='0.2'>
                        <button class="button-UI" id="muteBtn"> <img
                                id="mute-btn-image" class="button-image-offset"
                                src="./assets/img/13_icons/mute-icon.png" alt=""></button>
                        <button class="button-UI" id="fullscreenBtn"> <img id="fullscreen-btn-image"
                                class="button-image-offset" src="assets/img/13_icons/fullscreen-open.png"
                                alt=""></button>
                    </div>
                    <!-- button-bar-bottom -->
                    <div id="mobile-controls" class="show-only-on-Mobile hide-object">
                        <div>
                            <button id="btn-left" class="button-UI"> <img class="button-mirror-image"
                                    src="./assets/img/13_icons/arrow-icon.png" alt=""></button>
                            <button id="btn-right" class="button-UI"> <img src="./assets/img/13_icons/arrow-icon.png"
                                    alt=""> </button>
                        </div>
                        <div>
                            <button id="btn-space" class="button-UI"> <img src="./assets/img/13_icons/jump-icon.png"
                                    alt=""> </button>
                            <button id="btn-d" class="button-UI"> <img src="./assets/img/13_icons/bottle-icon.png"
                                    alt=""> </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="controls hide-on-mobile">
                <p><span>[Left]</span> and <span>[Right]</span> to run</p>
                <p><span>[Space]</span> to jump</p>
                <p><span>[d]</span> to throw a bottle</p>
            </div>
        </section>
    </main>


    <footer>
        <div class="footer-content">
            <a href="./ressourcen.html">Resources</a>
            <a href="./impressum.html">Impressum</a>
        </div>
    </footer>
</body>

</html>
