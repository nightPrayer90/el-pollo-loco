<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pollo Loco</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/8_coin/coin_1.png">
    <link rel="stylesheet" href="./styles/font.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/index.css">

    <script src="./scripts/models/keyboard.class.js" defer></script>
    <script src="./scripts/manager-classes/image-hub.js" defer></script>
    <script src="./scripts/manager-classes/interval-hub.js" defer></script>
    <script src="./scripts/manager-classes/audio-hub.js" defer></script>
    <script src="./scripts/models/drawable-object.class.js" defer></script>
    <script src="./scripts/models/movable-object.class.js" defer></script>
    <script src="./scripts/models/throwable-object.class.js" defer></script>
    <script src="./scripts/models/character.class.js" defer></script>
    <script src="./scripts/models/particle-system.class.js" defer></script>
    <script src="./scripts/models/obstacle.class.js" defer></script>
    <script src="./scripts/models/chicken.class.js" defer></script>
    <script src="./scripts/models/endboss.class.js" defer></script>
    <script src="./scripts/models/cloud.class.js" defer></script>
    <script src="./scripts/models/collectables.class.js" defer></script>
    <script src="./scripts/models/status-object.class.js" defer></script>
    <script src="./scripts/models/status-bar.class.js" defer></script>
    <script src="./scripts/models/background-objects.class.js" defer></script>
    <script src="./scripts/models/level.class.js" defer></script>
    <script src="./scripts/levels/level1.js" defer></script>

    <script src="./scripts/models/world.class.js" defer></script>
    <script src="./scripts/fullscreen.js" defer></script>
    <script src="./scripts/overlayUI.js" defer></script>
    <script src="./scripts/game.js" defer></script>
</head>

<body onload="init()">
    <header>
        <div>

        </div>
    </header>


    <main>
        <section>
            <h1>EL POLLO LOCO</h1>
            <div id="fullscreen">
                <canvas id="canvas" width="720" height="480"></canvas>

                <div id="overlay-main-menu">
                    <button class="button-rect" onclick="startGame()"> Start Hunt! </button>
                </div>

                <div id="overlay-UI" class="hide-object">
                    <div class="button-top">


                        <input class="audio_slider" type="range" oninput="AudioHub.objSetVolume()" id='volume' min=0
                            max=1 step=0.01 value='0.2'>


                        <button class="button-UI" onclick="AudioHub.toggleSound(); toggleMuteBtnSprite()"> <img
                                id="mute-btn-image" class="button-image-offset"
                                src="./assets/img/13_icons/mute-icon.png" alt=""></button>
                        <button class="button-UI" onclick="toggleFullscreen()"> <img id="fullscreen-btn-image"
                                class="button-image-offset" src="assets/img/13_icons/fullscreen-open.png"
                                alt=""></button>
                    </div>
                    <div id="mobile-controls" class="button-bottom hide-object">
                        <div>
                            <button id="btn-left" class="button-UI"> <img class="button-mirror-image"
                                    src="./assets/img/13_icons/arrow-icon.png" alt=""></button>
                            <button id="btn-right" class="button-UI"> <img src="./assets/img/13_icons/arrow-icon.png" alt=""> </button>
                        </div>
                        <div>
                            <button id="btn-space" class="button-UI"> <img src="./assets/img/13_icons/jump-icon.png" alt=""> </button>
                            <button id="btn-d" class="button-UI"> <img src="./assets/img/13_icons/bottle-icon.png" alt=""> </button>
                        </div>
                    </div>
                </div>
            </div>



        </section>
    </main>


    <footer>
        <div>

        </div>
    </footer>
</body>

</html>
